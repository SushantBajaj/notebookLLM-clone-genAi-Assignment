<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoteBook LLM Clone</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="source-panel">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M7 4.75h7.2L18 8.55v10.7H7z" />
              <path d="M14 4.75v4h4" />
              <path d="M9.75 12.25h5.2M9.75 15.25h4" />
            </svg>
          </span>
          <div>
            <h1>NoteBook LLM Clone</h1>
            <p>Source-grounded chat across your documents.</p>
          </div>
        </div>

        <section class="document-library" aria-label="Uploaded documents">
          <div class="library-header">
            <span class="source-label">Chat sources</span>
            <span id="documentCount">0</span>
          </div>
          <div class="document-list" id="documentList" role="list"></div>
        </section>

        <div class="source-actions">
          <section class="upload-progress" id="uploadProgress" aria-live="polite" hidden>
            <div class="progress-orbit" aria-hidden="true">
              <svg viewBox="0 0 44 44" role="img">
                <circle class="progress-track" cx="22" cy="22" r="17" />
                <circle class="progress-ring" cx="22" cy="22" r="17" />
                <path d="M18 22.5l2.7 2.7L27 18.8" />
              </svg>
            </div>
            <div class="progress-copy">
              <strong id="uploadProgressTitle">Preparing upload</strong>
              <span id="uploadProgressDetail">Checking the source file</span>
              <div class="progress-bar" aria-hidden="true">
                <span></span>
              </div>
            </div>
          </section>

          <label class="upload-zone" for="documentInput" id="uploadZone">
            <input
              id="documentInput"
              type="file"
              multiple
              accept=".pdf,.doc,.docx,.csv,application/pdf,text/csv,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            />
            <span class="upload-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </span>
            <span class="upload-copy">
              <span class="upload-title">Upload sources</span>
              <span class="upload-detail">Drop PDFs, DOC, DOCX, or CSV files here</span>
            </span>
          </label>
        </div>
      </aside>

      <section class="chat-panel" aria-label="Document chat">
        <div class="chat-header">
          <div>
            <span class="eyebrow">LLM workspace</span>
            <h2>Chat with your documents</h2>
          </div>
          <span class="status-pill" id="statusPill">Waiting for source</span>
        </div>

        <div class="messages" id="messages" aria-live="polite">
          <article class="message assistant">
            <p>Upload sources to begin. Check the documents you want included, then ask document-aware questions.</p>
          </article>
        </div>

        <form class="composer" id="chatForm">
          <input
            id="chatInput"
            type="text"
            placeholder="Upload documents to start chatting"
            autocomplete="off"
            disabled
          />
          <button id="sendButton" type="submit" aria-label="Send message" disabled>
            <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
              <path d="M5 12h13M13 6l6 6-6 6" />
            </svg>
          </button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
